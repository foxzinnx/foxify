<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Entrar no FX / Foxify</title>
</head>
<body>
    <div class="container">
        <div class="criar-conta">
            <div class="titulo">
                <i class="fa-solid fa-xmark"></i>
                <h2>Criar conta</h2>
            </div>
            <div class="input">
                <label id="lab-email" for="email">Email</label>
                <input type="email" id="email" autocomplete="off" placeholder="seuemail@gmail.com" required>

                <label id="lab-senha" for="senha">Senha</label>
                <input type="password" id="senha" autocomplete="off" placeholder="Senha" maxlength="15" required>

                <input type="date" id="nascimento" required>
                <label id="lab-date" for="nascimento">Insira sua data de nascimento</label>
            </div>

            <div class="btn">
                <button type="button" id="btn-send">Criar conta</button>
            </div>

            <div class="ref-login">
                <p>Já tem uma conta? <a href="#">Entrar</a></p>
            </div>
        </div>
    </div>
</body>
</html>
